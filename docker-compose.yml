services:
  postgres:
    image: postgres:16
    container_name: job_tracker_db
    environment:
       POSTGRES_DB: job_tracker
       POSTGRES_USER: job_tracker_user
       POSTGRES_PASSWORD: job_tracker_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
